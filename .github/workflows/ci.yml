name: CI

# Run on every branch (so homework hw/<name> branches get checked too)
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests (MANDATORY — must be green)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -v         # no "|| true": a failure here is a real red X

  smoke:
    name: Smoke test (does it run?)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python taxi_model_FINAL.py

  format:
    name: Format (black) — warning only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install black
      - name: Check formatting (non-blocking for now)
        run: |
          black --check --diff . || \
          echo "::warning::Code is not black-formatted. Allowed for now — this becomes mandatory in the clean-code session."

  lint:
    name: Lint (flake8) — warning only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install flake8
      - name: Lint (non-blocking for now)
        run: |
          flake8 . || \
          echo "::warning::flake8 found style issues. Allowed for now — this becomes mandatory in the clean-code session."