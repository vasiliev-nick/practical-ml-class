# ruff.toml — linter configuration for TaxiFlow
# We turn on a few extra rule groups so the linter surfaces more of the
# code smells (the course's "smell map" lives here, automated).
# Remember: CI reports these as warnings; it does not block merging.

line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports / variables, etc.)
    "W",   # pycodestyle warnings
    "B",   # flake8-bugbear (likely bugs & bad practices)
    "UP",  # pyupgrade (outdated patterns)
    "SIM", # flake8-simplify
]
